
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carnettu di Missaghji</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="screen">
  <main class="card narrow">
    <h1 class="title">CARNETTU DI MISSAGHJI</h1>
    <form id="startForm" novalidate>
      <label for="username">A to casata</label>
      <input id="username" name="username" type="text" autocomplete="off" autocapitalize="characters" placeholder="" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ\-\s]+$" required />
      <label for="entity">Entità</label>
      <select id="entity" name="entity" required>
        <option value="BAO">BAO</option>
        <option value="BOBA">BOBA</option>
        <option value="BOCC">BOCC</option>
        <option value="BOES">BOES</option>
        <option value="BOGA">BOGA</option>
        <option value="BOGB">BOGB</option>
        <option value="BOPO">BOPO</option>
        <option value="BOVA">BOVA</option>
      </select>
      <br>
      <button type="submit" class="btn primary">Entra</button>
    </form>
  </main>
  <script>window.APP_VERSION='v1.3.3';</script>
  <script src="app.js"></script>
</body>
</html>
