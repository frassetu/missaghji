<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PWA Messagerie</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="manifest" href="manifest.json" />
</head>
<body>
<h1>Accueil</h1>
<form id="startForm">
<label>Nom :</label>
<input id="username" type="text" pattern="[A-Za-z]+" required />
<label>Entité :</label>
<select id="entity" required>
<option value="BAO">BAO</option>
<option value="BOBA">BOBA</option>
<option value="BOCC">BOCC</option>
<option value="BOES">BOES</option>
<option value="BOGA">BOGA</option>
<option value="BOGB">BOGB</option>
<option value="BOPO">BOPO</option>
<option value="BOVA">BOVA</option>
</select>
<button type="submit">Valider</button>
</form>
<script src="js/app.js"></script>
</body>
</html>
