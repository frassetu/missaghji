<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5cff">
  <title>Missaghji</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Missaghji</h1>
    <nav class="menu">
      <button id="installBtn" class="secondary">Installer</button>
      <span class="version" id="appVersion">v1.0.0</span>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Paramètres</h2>
      <div class="grid">
        <div>
          <label for="role">Rôle</label>
          <select id="role">
            <option value="emetteur">Émetteur</option>
            <option value="recepteur">Récepteur</option>
          </select>
        </div>
        <div>
          <label for="nom">Nom</label>
          <input id="nom" type="text" inputmode="text" placeholder="Votre nom" pattern="[A-Za-zÀ-ÖØ-öø-ÿ ' -]+" required>
          <small class="hint">Lettres uniquement (accents autorisés)</small>
        </div>
        <div>
          <label for="entite">Entité</label>
          <select id="entite">
            <option value="BAO">BAO</option>
            <option value="DELCO">DELCO</option>
            <option value="AUTRE">AUTRE</option>
          </select>
        </div>
        <div>
          <label for="fonction">Fonction</label>
          <select id="fonction">
            <option value="CCO">CCO</option>
            <option value="BO">BO</option>
            <option value="AUTRE">AUTRE</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Génération de numéro</h2>
      <div class="actions">
        <button id="genBtn" class="primary">Générer un numéro</button>
        <output id="numero" class="badge">—</output>
      </div>
      <p class="muted" id="sequenceInfo"></p>
    </section>

    <section class="card">
      <h2>Historique</h2>
      <div class="actions">
        <button id="exportBtn" class="secondary">Exporter (CSV)</button>
        <button id="clearBtn" class="danger">Supprimer tout</button>
      </div>
      <table id="historyTable">
        <thead><tr>
          <th>Date/Heure</th><th>Rôle</th><th>Numéro</th><th>Nom</th><th>Entité</th><th>Fonction</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <small>Mis à jour le 2026-03-02 — v1.0.0</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
